# =============================================================
#  GitHub Actions — Android APK 自动构建
#  项目: Markor (net.gsantner.markor)
#  AGP: 8.13.2  |  Gradle: 8.14.5  |  JDK: 17
# =============================================================
name: Build Android APK

# ── 触发条件 ──────────────────────────────────────────────
on:
  # 推送任意分支的代码时自动触发
  push:
    branches: ['**']
  # 允许在 GitHub 网页上手动触发
  workflow_dispatch:

# ── 权限 ──────────────────────────────────────────────────
permissions:
  contents: read
  actions: write   # 允许上传 Artifacts

# ── 任务 ──────────────────────────────────────────────────
jobs:
  build:
    # 使用 Ubuntu 最新版 runners（GitHub 免费提供，含 Git 预装）
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # 完整历史记录：项目 build.gradle 中调用了 git rev-parse 和 git log，
          # shallow clone（fetch-depth:1）也够用，但完整历史更可靠
          fetch-depth: 0

      # ── 2. 配置 JDK 17 ───────────────────────────────────
      # AGP 8.x 强制要求 JDK 17+，此处使用 Eclipse Temurin 发行版
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 配置 Android SDK ──────────────────────────────
      # 通过 android-actions/setup-android 自动安装 cmdline-tools、
      # 接受 license、设置 ANDROID_HOME 环境变量
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle wrapper 可执行权限 ────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. 执行构建 ──────────────────────────────────────
      # 使用 assembleFlavorDefaultDebug 只构建 default flavor 的 debug 变体，
      # 速度最快；如需构建全部 flavor 可改为 assembleDebug
      - name: Build APK with Gradle
        run: ./gradlew assembleFlavorDefaultDebug

      # ── 6. 上传 APK 作为构建产物 ─────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact 名称（可在 GitHub 下载页面看到）
          name: app-debug-apk
          # APK 输出路径（Gradle 默认输出目录）
          path: app/build/outputs/apk/flavorDefault/debug/*.apk
          # 保留天数：30 天后自动清理
          retention-days: 30
